<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="540" cy="750" r="220" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>

  <!-- Icon: Behind the scenes / Code + Camera -->
  <g transform="translate(540, 730)">
    <!-- Code brackets -->
    <text x="-80" y="-30" fill="#ff9a9e" font-family="monospace" font-size="80" opacity="0.5">{</text>
    <text x="40" y="-30" fill="#ff9a9e" font-family="monospace" font-size="80" opacity="0.5">}</text>

    <!-- Progress/build lines -->
    <rect x="-50" y="20" width="100" height="8" rx="4" fill="#ff9a9e" opacity="0.3"/>
    <rect x="-50" y="20" width="65" height="8" rx="4" fill="#ff9a9e" opacity="0.5"/>

    <rect x="-50" y="40" width="100" height="8" rx="4" fill="#fecfef" opacity="0.2"/>
    <rect x="-50" y="40" width="80" height="8" rx="4" fill="#fecfef" opacity="0.4"/>

    <rect x="-50" y="60" width="100" height="8" rx="4" fill="#ff9a9e" opacity="0.2"/>
    <rect x="-50" y="60" width="45" height="8" rx="4" fill="#ff9a9e" opacity="0.4"/>

    <!-- Gear/settings icon -->
    <circle cx="0" cy="120" r="25" fill="none" stroke="#fecfef" stroke-width="2.5" opacity="0.4"/>
    <circle cx="0" cy="120" r="10" fill="none" stroke="#fecfef" stroke-width="2" opacity="0.5"/>
    <!-- Gear teeth -->
    <rect x="-3" y="90" width="6" height="12" rx="2" fill="#fecfef" opacity="0.4"/>
    <rect x="-3" y="138" width="6" height="12" rx="2" fill="#fecfef" opacity="0.4"/>
    <rect x="-30" y="117" width="12" height="6" rx="2" fill="#fecfef" opacity="0.4"/>
    <rect x="18" y="117" width="12" height="6" rx="2" fill="#fecfef" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="540" y="1120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">BASTIDOR</text>

  <!-- Subtitle -->
  <text x="540" y="1200" text-anchor="middle" fill="#ff9a9e" font-family="Arial, sans-serif" font-size="32" opacity="0.8">Por tras do produto</text>
  <text x="540" y="1250" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.6">Novidades, updates e evolucao</text>

  <!-- Bottom accent line -->
  <rect x="440" y="1310" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Brand -->
  <text x="540" y="1800" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" opacity="0.3" letter-spacing="6">RADAR FINANCEIRO</text>
</svg>