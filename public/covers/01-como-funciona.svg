<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="540" cy="750" r="220" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <circle cx="540" cy="750" r="180" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.15"/>

  <!-- Icon: Play/Steps -->
  <g transform="translate(540, 750)">
    <!-- Step indicators -->
    <circle cx="-120" cy="-40" r="28" fill="#4facfe" opacity="0.9"/>
    <text x="-120" y="-30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">1</text>

    <circle cx="-40" cy="-40" r="28" fill="#4facfe" opacity="0.7"/>
    <text x="-40" y="-30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">2</text>

    <circle cx="40" cy="-40" r="28" fill="#4facfe" opacity="0.5"/>
    <text x="40" y="-30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">3</text>

    <circle cx="120" cy="-40" r="28" fill="#4facfe" opacity="0.3"/>
    <text x="120" y="-30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">4</text>

    <!-- Phone mockup -->
    <rect x="-60" y="20" width="120" height="200" rx="12" fill="none" stroke="#4facfe" stroke-width="3" opacity="0.6"/>
    <rect x="-45" y="50" width="90" height="8" rx="4" fill="#4facfe" opacity="0.3"/>
    <rect x="-45" y="70" width="70" height="8" rx="4" fill="#4facfe" opacity="0.2"/>
    <rect x="-45" y="90" width="80" height="8" rx="4" fill="#4facfe" opacity="0.25"/>
    <rect x="-45" y="120" width="90" height="60" rx="6" fill="#4facfe" opacity="0.1"/>
  </g>

  <!-- Title -->
  <text x="540" y="1120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">COMO</text>
  <text x="540" y="1200" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">FUNCIONA</text>

  <!-- Subtitle -->
  <text x="540" y="1280" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.6">Demo do app em 4 etapas</text>

  <!-- Bottom accent line -->
  <rect x="440" y="1340" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Brand -->
  <text x="540" y="1800" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" opacity="0.3" letter-spacing="6">RADAR FINANCEIRO</text>
</svg>