<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="540" cy="750" r="220" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>

  <!-- Icon: 3 Price Cards -->
  <g transform="translate(540, 730)">
    <!-- Card 1 - Basic -->
    <rect x="-160" y="-100" width="85" height="130" rx="8" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
    <rect x="-148" y="-80" width="60" height="6" rx="3" fill="#ffd700" opacity="0.2"/>
    <rect x="-148" y="-60" width="40" height="6" rx="3" fill="#ffd700" opacity="0.15"/>
    <rect x="-148" y="-40" width="50" height="6" rx="3" fill="#ffd700" opacity="0.15"/>
    <text x="-118" y="-5" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="14" opacity="0.5">FREE</text>

    <!-- Card 2 - Pro (highlighted) -->
    <rect x="-42" y="-120" width="85" height="160" rx="8" fill="#ffd700" opacity="0.08" stroke="#ffd700" stroke-width="3" />
    <rect x="-30" y="-95" width="60" height="6" rx="3" fill="#ffd700" opacity="0.3"/>
    <rect x="-30" y="-75" width="40" height="6" rx="3" fill="#ffd700" opacity="0.2"/>
    <rect x="-30" y="-55" width="50" height="6" rx="3" fill="#ffd700" opacity="0.2"/>
    <rect x="-30" y="-35" width="45" height="6" rx="3" fill="#ffd700" opacity="0.2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="16" font-weight="bold" opacity="0.8">PRO</text>
    <!-- Crown -->
    <polygon points="0,-140 -12,-125 -20,-135 -8,-120 8,-120 20,-135 12,-125" fill="#ffd700" opacity="0.6"/>

    <!-- Card 3 - Premium -->
    <rect x="75" y="-100" width="85" height="130" rx="8" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.4"/>
    <rect x="87" y="-80" width="60" height="6" rx="3" fill="#ffaa00" opacity="0.2"/>
    <rect x="87" y="-60" width="40" height="6" rx="3" fill="#ffaa00" opacity="0.15"/>
    <rect x="87" y="-40" width="50" height="6" rx="3" fill="#ffaa00" opacity="0.15"/>
    <text x="118" y="-5" text-anchor="middle" fill="#ffaa00" font-family="Arial, sans-serif" font-size="14" opacity="0.5">MAX</text>
  </g>

  <!-- Title -->
  <text x="540" y="1120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">PLANOS</text>

  <!-- Subtitle -->
  <text x="540" y="1200" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="32" opacity="0.8">Escolha o seu</text>
  <text x="540" y="1250" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.6">3 planos com link direto</text>

  <!-- Bottom accent line -->
  <rect x="440" y="1310" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Brand -->
  <text x="540" y="1800" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" opacity="0.3" letter-spacing="6">RADAR FINANCEIRO</text>
</svg>