<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="540" cy="750" r="220" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>

  <!-- Icon: Chat/AI Brain -->
  <g transform="translate(540, 750)">
    <!-- Brain/AI symbol -->
    <circle cx="0" cy="-60" r="50" fill="none" stroke="#a18cd1" stroke-width="3" opacity="0.8"/>
    <path d="M-20,-80 Q0,-100 20,-80" fill="none" stroke="#a18cd1" stroke-width="2.5" opacity="0.6"/>
    <path d="M-25,-60 Q0,-85 25,-60" fill="none" stroke="#a18cd1" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="-60" r="6" fill="#a18cd1" opacity="0.9"/>

    <!-- Chat bubbles -->
    <rect x="-100" y="30" width="180" height="50" rx="25" fill="none" stroke="#fbc2eb" stroke-width="2.5" opacity="0.5"/>
    <rect x="-80" y="48" width="100" height="6" rx="3" fill="#fbc2eb" opacity="0.3"/>

    <rect x="-60" y="100" width="160" height="50" rx="25" fill="#a18cd1" opacity="0.15"/>
    <rect x="-40" y="118" width="90" height="6" rx="3" fill="#a18cd1" opacity="0.4"/>

    <!-- Connection dots -->
    <circle cx="-15" cy="10" r="4" fill="#fbc2eb" opacity="0.4"/>
    <circle cx="5" cy="18" r="3" fill="#fbc2eb" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="540" y="1120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">A IA</text>
  <text x="540" y="1200" text-anchor="middle" fill="#a18cd1" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">RESPONDE</text>

  <!-- Subtitle -->
  <text x="540" y="1280" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.6">Perguntas reais, respostas reais</text>

  <!-- Bottom accent line -->
  <rect x="440" y="1340" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Brand -->
  <text x="540" y="1800" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" opacity="0.3" letter-spacing="6">RADAR FINANCEIRO</text>
</svg>