  <style>

    p { color: #6b7280; font-size: 0.95rem; line-height: 1.5; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>

</html>
